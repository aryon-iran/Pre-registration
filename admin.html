<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>پنل مدیریت | AR Game</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;900&display=swap" rel="stylesheet" />
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Vazirmatn', sans-serif;
  background: #0B1120;
  color: #E8EDF5;
  min-height: 100vh;
  direction: rtl;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 40px;
  background: rgba(11,17,32,0.7);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  position: sticky;
  top:0;
  z-index:100;
}
.logo {
  font-size: 1.5rem;
  font-weight: 900;
  background: linear-gradient(135deg, #A78BFA, #6C3CE1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.admin-badge {
  background: rgba(108,60,225,0.15);
  padding: 6px 18px;
  border-radius: 40px;
  color: #A78BFA;
  font-weight: 600;
  font-size: 0.9rem;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 30px 24px 60px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  margin-bottom: 36px;
}
.stat-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  padding: 22px 18px;
  text-align: center;
}
.stat-card .num {
  font-size: 2.4rem;
  font-weight: 900;
  color: #A78BFA;
}
.stat-card .label {
  color: #94A3B8;
  font-size: 0.9rem;
}
.section-title {
  font-size: 1.4rem;
  font-weight: 700;
  color: #E8EDF5;
  margin-bottom: 16px;
}
.table-wrap {
  background: rgba(255,255,255,0.02);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.05);
  overflow: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 500px;
}
th {
  text-align: right;
  padding: 14px 20px;
  color: #A78BFA;
  font-weight: 700;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
td {
  padding: 12px 20px;
  color: #CBD5E1;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.badge {
  display: inline-block;
  padding: 2px 14px;
  border-radius: 40px;
  font-size: 0.75rem;
  font-weight: 700;
}
.badge-success { background: rgba(52,211,153,0.15); color: #6EE7B7; }
.badge-warning { background: rgba(251,191,36,0.15); color: #FBBF24; }
.logout-link {
  color: #F87171;
  text-decoration: none;
  font-weight: 600;
}
.logout-link:hover { color: #EF4444; }
@media(max-width:640px){ .header{ padding:12px 20px; } .stats{ grid-template-columns:1fr 1fr; } }
</style>
</head>
<body>

<script>
if (!localStorage.getItem('adminLoggedIn')) window.location.href = 'login.html';
</script>

<header class="header">
  <div class="logo">✦ AR Game</div>
  <div class="admin-badge">👑 پنل مدیریت</div>
</header>

<div class="container">
  <h2 style="margin-bottom:4px;">📊 داشبورد</h2>
  <p style="color:#94A3B8; margin-bottom:28px;">خلاصه وضعیت AR Game</p>

  <div class="stats">
    <div class="stat-card"><div class="num" id="userCount">۰</div><div class="label">👥 کاربران</div></div>
    <div class="stat-card"><div class="num">۳۲</div><div class="label">🎮 بازی‌ها</div></div>
    <div class="stat-card"><div class="num">۸۹٪</div><div class="label">⭐ رضایت</div></div>
  </div>

  <h3 class="section-title">👥 آخرین کاربران ثبت‌نامی</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>نام</th><th>نام کاربری</th><th>ایمیل</th><th>تاریخ</th><th>وضعیت</th></tr></thead>
      <tbody id="userTable">
        <tr><td colspan="5" style="text-align:center;color:#475569;">در حال بارگذاری...</td></tr>
      </tbody>
    </table>
  </div>
  <div style="margin-top:24px; text-align:left;">
    <a href="#" onclick="localStorage.removeItem('adminLoggedIn'); window.location.href='login.html';" class="logout-link">🚪 خروج از پنل</a>
  </div>
</div>

<script>
const BIN_URL = 'https://api.jsonbin.io/v3/b/YOUR_BIN_ID';
const API_KEY = '$2a$10$YOUR_API_KEY';

async function loadUsers() {
  try {
    const res = await fetch(BIN_URL, { headers: { 'X-Master-Key': API_KEY } });
    const data = await res.json();
    const users = data.record.users || [];
    document.getElementById('userCount').textContent = users.length;
    const tbody = document.getElementById('userTable');
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#475569;">هیچ کاربری ثبت نشده</td></tr>';
      return;
    }
    tbody.innerHTML = users.slice(-5).reverse().map(u => `
      <tr>
        <td>${u.fullname}</td>
        <td>${u.username}</td>
        <td>${u.email}</td>
        <td>${u.registeredAt || '---'}</td>
        <td><span class="badge badge-success">فعال</span></td>
      </tr>
    `).join('');
  } catch {
    document.getElementById('userTable').innerHTML = '<tr><td colspan="5" style="text-align:center;color:#F87171;">خطا در بارگذاری</td></tr>';
  }
}
loadUsers();
</script>
</body>
</html>
