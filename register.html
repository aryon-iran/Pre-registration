<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ثبت‌نام | AR Game</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;900&display=swap" rel="stylesheet" />
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Vazirmatn', sans-serif;
  background: #0B1120;
  color: #E8EDF5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px;
  direction: rtl;
}
.card {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 32px;
  padding: 44px 38px;
  max-width: 460px;
  width: 100%;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
}
.card h1 {
  font-size: 2.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, #A78BFA, #6C3CE1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
  margin-bottom: 8px;
}
.card .subtitle {
  text-align: center;
  color: #94A3B8;
  margin-bottom: 28px;
  font-size: 0.95rem;
}
.form-group {
  margin-bottom: 18px;
}
.form-group label {
  display: block;
  font-weight: 600;
  color: #CBD5E1;
  margin-bottom: 5px;
  font-size: 0.9rem;
}
.form-group input {
  width: 100%;
  padding: 12px 18px;
  border-radius: 40px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color: #F1F5F9;
  font-size: 1rem;
  font-family: inherit;
  outline: none;
  transition: 0.25s;
}
.form-group input:focus {
  border-color: #6C3CE1;
  box-shadow: 0 0 0 3px rgba(108,60,225,0.15);
}
.form-group input::placeholder { color: #475569; }
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 60px;
  font-size: 1.1rem;
  font-weight: 700;
  font-family: inherit;
  background: linear-gradient(135deg, #6C3CE1, #4F46E5);
  color: #fff;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 6px 24px rgba(108,60,225,0.25);
  margin-top: 8px;
}
.btn:hover { transform: scale(1.02); box-shadow: 0 8px 32px rgba(108,60,225,0.4); }
#status {
  text-align: center;
  margin-top: 16px;
  font-weight: 600;
  color: #6EE7B7;
}
#status.error { color: #F87171; }
#status.warning { color: #FBBF24; }
.links {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
  font-size: 0.9rem;
}
.links a {
  color: #94A3B8;
  text-decoration: none;
  transition: 0.2s;
}
.links a:hover { color: #A78BFA; }
</style>
</head>
<body>

<div class="card">
  <h1>✦ ثبت‌نام</h1>
  <p class="subtitle">به جمع بازیکنان AR Game بپیوند</p>
  <form id="registerForm">
    <div class="form-group">
      <label>نام کامل</label>
      <input type="text" id="fullname" placeholder="علی رضایی" required />
    </div>
    <div class="form-group">
      <label>نام کاربری</label>
      <input type="text" id="username" placeholder="حداقل ۳ کاراکتر" required />
    </div>
    <div class="form-group">
      <label>ایمیل</label>
      <input type="email" id="email" placeholder="example@email.com" required />
    </div>
    <div class="form-group">
      <label>رمز عبور</label>
      <input type="password" id="password" placeholder="حداقل ۶ کاراکتر" required />
    </div>
    <button type="submit" class="btn">✨ ثبت‌نام</button>
  </form>
  <div id="status"></div>
  <div class="links">
    <a href="login.html">قبلاً ثبت‌نام کردی؟ وارد شو</a>
    <a href="index.html">← بازگشت</a>
  </div>
</div>

<script>
const BIN_URL = 'https://api.jsonbin.io/v3/b/6a49291af5f4af5e295f3dc7';
const MASTER_KEY = '$2a$10$QiD9l/D7m8hTGNnFASLf2.n5VZe6yAIUolrrbDKirrpteGeBDGcwC';

const form = document.getElementById('registerForm');
const statusMsg = document.getElementById('status');

form.addEventListener('submit', async function(e) {
  e.preventDefault();

  const fullname = document.getElementById('fullname').value.trim();
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!fullname || !username || !email || !password) {
    statusMsg.textContent = '❌ همه فیلدها رو پر کن!';
    statusMsg.className = 'error';
    return;
  }
  if (username.length < 3) {
    statusMsg.textContent = '❌ نام کاربری حداقل ۳ کاراکتر!';
    statusMsg.className = 'error';
    return;
  }
  if (password.length < 6) {
    statusMsg.textContent = '❌ رمز عبور حداقل ۶ کاراکتر!';
    statusMsg.className = 'error';
    return;
  }

  statusMsg.textContent = '⏳ در حال ثبت...';
  statusMsg.className = '';

  // ====== کاربر جدید با نقش "pending" ======
  const newUser = {
    fullname,
    username,
    email,
    password: btoa(password),
    role: 'pending',      // <-- در انتظار تایید
    status: 'pending',    // <-- وضعیت تایید
    registeredAt: new Date().toLocaleString('fa-IR')
  };

  try {
    const getRes = await fetch(BIN_URL, {
      headers: { 'X-Master-Key': MASTER_KEY }
    });

    if (!getRes.ok) throw new Error('خطا در دریافت داده');

    const getData = await getRes.json();
    const record = getData.record || { users: [] };

    if (record.users.find(u => u.email === email)) {
      statusMsg.textContent = '❌ این ایمیل قبلاً ثبت شده!';
      statusMsg.className = 'error';
      return;
    }

    record.users.push(newUser);

    const putRes = await fetch(BIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': MASTER_KEY
      },
      body: JSON.stringify(record)
    });

    if (!putRes.ok) throw new Error('خطا در ذخیره‌سازی');

    // ====== پیام مخصوص ======
    statusMsg.innerHTML = '✅ ثبت‌نام شما با موفقیت انجام شد!<br />⏳ در حال حاضر توسط ادمین در حال بررسی هستید.<br />به زودی تایید می‌شوید.';
    statusMsg.className = 'warning';
    form.reset();

    setTimeout(() => {
      window.location.href = 'login.html';
    }, 4000);

  } catch (error) {
    console.error(error);
    statusMsg.textContent = '❌ خطا در ارتباط با سرور! دوباره تلاش کن.';
    statusMsg.className = 'error';
  }
});
</script>
</body>
</html>
