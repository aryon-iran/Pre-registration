<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ورود | AR Game</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;900&display=swap" rel="stylesheet" />
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Vazirmatn', sans-serif;
  background: #0B1120;
  color: #E8EDF5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px;
  direction: rtl;
}
.card {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 32px;
  padding: 44px 38px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
}
.card h1 {
  font-size: 2.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, #A78BFA, #6C3CE1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
  margin-bottom: 8px;
}
.card .subtitle {
  text-align: center;
  color: #94A3B8;
  margin-bottom: 28px;
  font-size: 0.95rem;
}
.form-group { margin-bottom: 18px; }
.form-group label {
  display: block;
  font-weight: 600;
  color: #CBD5E1;
  margin-bottom: 5px;
  font-size: 0.9rem;
}
.form-group input {
  width: 100%;
  padding: 12px 18px;
  border-radius: 40px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color: #F1F5F9;
  font-size: 1rem;
  font-family: inherit;
  outline: none;
  transition: 0.25s;
}
.form-group input:focus {
  border-color: #6C3CE1;
  box-shadow: 0 0 0 3px rgba(108,60,225,0.15);
}
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 60px;
  font-size: 1.1rem;
  font-weight: 700;
  font-family: inherit;
  background: linear-gradient(135deg, #6C3CE1, #4F46E5);
  color: #fff;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 6px 24px rgba(108,60,225,0.25);
  margin-top: 8px;
}
.btn:hover { transform: scale(1.02); box-shadow: 0 8px 32px rgba(108,60,225,0.4); }
#status {
  text-align: center;
  margin-top: 16px;
  font-weight: 600;
  color: #6EE7B7;
}
#status.error { color: #F87171; }
.links {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
  font-size: 0.9rem;
}
.links a {
  color: #94A3B8;
  text-decoration: none;
  transition: 0.2s;
}
.links a:hover { color: #A78BFA; }
</style>
</head>
<body>

<div class="card">
  <h1>✦ ورود</h1>
  <p class="subtitle">به پنل مدیریت یا حساب کاربری خود وارد شوید</p>
  <form id="loginForm">
    <div class="form-group">
      <label>ایمیل</label>
      <input type="email" id="loginEmail" placeholder="example@email.com" required />
    </div>
    <div class="form-group">
      <label>رمز عبور</label>
      <input type="password" id="loginPassword" placeholder="رمز خود را وارد کنید" required />
    </div>
    <button type="submit" class="btn">🚀 ورود</button>
  </form>
  <div id="status"></div>
  <div class="links">
    <a href="register.html">ثبت‌نام نکردی؟</a>
    <a href="index.html">← بازگشت</a>
  </div>
</div>

<script>
const BIN_URL = 'https://api.jsonbin.io/v3/b/YOUR_BIN_ID';
const API_KEY = '$2a$10$YOUR_API_KEY';
const form = document.getElementById('loginForm');
const statusMsg = document.getElementById('status');

form.addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();

  statusMsg.textContent = '⏳ در حال بررسی...';
  statusMsg.className = '';

  try {
    const res = await fetch(BIN_URL, { headers: { 'X-Master-Key': API_KEY } });
    const data = await res.json();
    const users = data.record.users || [];
    const user = users.find(u => u.email === email && u.password === btoa(password));

    if (user) {
      statusMsg.textContent = '✅ ورود موفق!';
      statusMsg.className = '';
      localStorage.setItem('adminLoggedIn', 'true');
      localStorage.setItem('adminUser', JSON.stringify(user));
      setTimeout(() => window.location.href = 'admin.html', 1000);
    } else {
      statusMsg.textContent = '❌ ایمیل یا رمز عبور اشتباه!';
      statusMsg.className = 'error';
    }
  } catch {
    statusMsg.textContent = '❌ خطا!';
    statusMsg.className = 'error';
  }
});
</script>
</body>
</html>
